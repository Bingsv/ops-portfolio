# Flask API — K8s Deployment + Service
# 部署: kubectl apply -f flask-api.yaml
# 查看: kubectl get deploy,pods,svc -l app=flask-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-api
  labels:
    app: flask-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-api
  template:
    metadata:
      labels:
        app: flask-api
    spec:
      containers:
      - name: flask-api
        image: flask-api:v4
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: flask-api-svc
  labels:
    app: flask-api
spec:
  type: NodePort
  selector:
    app: flask-api
  ports:
  - port: 5000
    targetPort: 5000
