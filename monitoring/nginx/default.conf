# HTTP — /nginx_status 直接返回指标，其余跳转 HTTPS
server {
    listen 80;
    server_name _;

    # Prometheus 采集入口（HTTP 明文，方便容器内抓取）
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    root   /usr/share/nginx/html;
    index  index.html;

    location = / {
        index  home/index.html;
    }

    location /api/ {
        proxy_pass http://flask-api:5000;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
