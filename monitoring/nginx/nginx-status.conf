# ============================================
# Nginx stub_status — 供 Prometheus 采集指标
# ============================================
# 放到 server 块内，只允许本地和 Docker 访问

location /nginx_status {
    stub_status on;
    access_log off;

    # 只允许本机和 Docker 内部网络访问
    allow 127.0.0.1;
    allow 172.16.0.0/12;   # Docker bridge 网段
    deny all;
}
